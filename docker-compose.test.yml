# ============================================
# Окремий Postgres для integration-тестів.
# Інший порт (5433), окремий volume — щоб тести не псували dev-БД.
#
# Запуск:
#   docker compose -f docker-compose.test.yml up -d
#   cd server && DATABASE_URL=postgresql://test:test@localhost:5433/test_db npm test
# ============================================
services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # in-memory — тести швидші, дані одноразові
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_db"]
      interval: 2s
      timeout: 2s
      retries: 10
